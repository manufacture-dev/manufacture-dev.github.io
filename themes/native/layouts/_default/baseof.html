<!DOCTYPE html>
<html lang="{{ with site.LanguageCode }}{{ . }}{{ else }}fr-FR{{ end }}">
{{- partial "head.html" . }}

<body>
  {{- with site.Params.gtm.id }}
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id={{ . }}"
            height="0" width="0"
            style="display:none;visibility:hidden">
    </iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->
  {{- end }}

  {{- partial "header.html" . }}

  <main id="main-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . }}
</body>

</html>
